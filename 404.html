  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(2rem, 8vw, 6rem) var(--container-pad);
      gap: var(--space-xl);
      position: relative;
      overflow: hidden;
    }

    .page-404__glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: var(--color-accent-glow);
      filter: blur(100px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .page-404__code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 12rem);
      line-height: 1;
      color: var(--color-accent);
      letter-spacing: 0.05em;
      position: relative;
    }

    .page-404__heading {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      position: relative;
    }

    .page-404__body {
      font-size: 1rem;
      color: var(--color-text-secondary);
      max-width: 400px;
      line-height: 1.65;
      position: relative;
    }

    .page-404__actions {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
    }

    .page-404__logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--color-text-primary);
      position: relative;
    }

    .page-404__logo-wordmark {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.04em;
    }
